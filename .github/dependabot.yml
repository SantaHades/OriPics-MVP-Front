version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    # 정책: 모든 패키지의 메이저 버전 업데이트는 자동 PR 차단.
    #   - peer dep 충돌·API 변경·schema 마이그레이션 등 회귀 위험이 일률적으로 높음
    #   - 메이저는 별도 인간 트랙으로 수동 진행 (follow-ups A-17·A-18 패턴 참고)
    # 마이너·패치는 아래 groups로 묶어서 자동 PR 진행 (안전한 범위).
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    # 마이너·패치는 카테고리별로 묶어서 단일 PR로 — 노이즈 감소.
    groups:
      next-ecosystem:
        patterns:
          - "next"
          - "@next/*"
          - "next-*"
        update-types: ["minor", "patch"]
      prisma:
        patterns:
          - "prisma"
          - "@prisma/*"
        update-types: ["minor", "patch"]
      types:
        patterns:
          - "@types/*"
        update-types: ["minor", "patch"]
      lint-test:
        patterns:
          - "eslint*"
          - "vitest"
          - "@vitest/*"
        update-types: ["minor", "patch"]

  # GitHub Actions 워크플로 자체의 업데이트 (현재 없지만 추후 추가 대비).
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 3
